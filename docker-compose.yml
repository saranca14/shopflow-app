version: "3.9"

services:
  # ---------- Data Stores ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ---------- Microservices ----------
  product-service:
    build: ./services/product-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/products_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  cart-service:
    build: ./services/cart-service
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis:6379/0
      PRODUCT_SERVICE_URL: http://product-service:8001
    depends_on:
      redis:
        condition: service_healthy
      product-service:
        condition: service_started
    restart: on-failure

  order-service:
    build: ./services/order-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/orders_db
      PAYMENT_SERVICE_URL: http://payment-service:8005
      CART_SERVICE_URL: http://cart-service:8002
      PRODUCT_SERVICE_URL: http://product-service:8001
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      payment-service:
        condition: service_started
      cart-service:
        condition: service_started
    restart: on-failure

  user-service:
    build: ./services/user-service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/users_db
      JWT_SECRET: local-dev-jwt-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  payment-service:
    build: ./services/payment-service
    ports:
      - "8005:8005"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PAYMENT_SUCCESS_RATE: "90"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./services/frontend
    ports:
      - "5000:5000"
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8001
      CART_SERVICE_URL: http://cart-service:8002
      ORDER_SERVICE_URL: http://order-service:8003
      USER_SERVICE_URL: http://user-service:8004
      SECRET_KEY: local-dev-secret-key
    depends_on:
      - product-service
      - cart-service
      - order-service
      - user-service
    restart: on-failure

volumes:
  postgres_data:
